name: Validate Portfolio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: npm ci

      - name: Run Jest Tests
        run: npm test

      - name: Validate Permanent Rules
        run: python validate-rules.py

      - name: Check Internal Links
        run: |
          echo "Checking internal links..."
          # Verify all referenced HTML pages exist
          for page in pages/cotidiano.html pages/galeria.html pages/projetos.html pages/trajetoria.html pages/quem-sou.html pages/yournotes.html; do
            if [ ! -f "$page" ]; then
              echo "❌ Missing page: $page"
              exit 1
            fi
          done
          # Verify components exist
          for comp in components/header.html components/footer.html components/nav-menu.html; do
            if [ ! -f "$comp" ]; then
              echo "❌ Missing component: $comp"
              exit 1
            fi
          done
          # Verify CSS files exist
          for css in assets/css/style.css assets/css/tokens.css assets/css/layout.css assets/css/buttons.css; do
            if [ ! -f "$css" ]; then
              echo "❌ Missing CSS: $css"
              exit 1
            fi
          done
          # Verify JS utils exist
          for js in assets/js/utils/component-loader.js assets/js/utils/typewriter.js assets/js/utils/component-checker.js assets/js/utils/navigation-checker.js; do
            if [ ! -f "$js" ]; then
              echo "❌ Missing JS util: $js"
              exit 1
            fi
          done
          echo "✅ All internal links verified!"

      - name: 1. HTML Validation — No duplicate closing tags
        run: |
          echo "Checking for duplicate </body> or </html> tags..."
          FAILED=0
          for file in index.html pages/*.html; do
            body_count=$(grep -c '</body>' "$file" 2>/dev/null || true)
            html_count=$(grep -c '</html>' "$file" 2>/dev/null || true)
            if [ "$body_count" -gt 1 ]; then
              echo "FAIL: $file has $body_count </body> tags (expected 1)"
              FAILED=1
            fi
            if [ "$html_count" -gt 1 ]; then
              echo "FAIL: $file has $html_count </html> tags (expected 1)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 0 ]; then
            echo "PASS: No duplicate closing HTML tags found"
          fi
          exit $FAILED

      - name: 2. No Duplicate Scripts — Each script imported once per file
        run: |
          echo "Checking for duplicate script imports..."
          FAILED=0
          for file in index.html pages/*.html; do
            duplicates=$(grep -o 'src="[^"]*\.js[^"]*"' "$file" 2>/dev/null | sort | uniq -d || true)
            if [ -n "$duplicates" ]; then
              echo "FAIL: $file has duplicate script imports:"
              echo "$duplicates"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 0 ]; then
            echo "PASS: No duplicate script imports found"
          fi
          exit $FAILED

      - name: 3. Cache Busting — All CSS imports use version query parameter
        run: |
          echo "Checking for CSS imports without cache busting..."
          FAILED=0
          for file in index.html pages/*.html; do
            missing=$(grep 'rel="stylesheet"' "$file" 2>/dev/null | grep -v '?v=' | grep 'assets/css' || true)
            if [ -n "$missing" ]; then
              echo "FAIL: $file has CSS imports without ?v= parameter:"
              echo "$missing"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 0 ]; then
            echo "PASS: All CSS imports have cache busting parameters"
          fi
          exit $FAILED

      - name: 4. No Hardcoded Colors — style.css uses tokens only
        run: |
          echo "Checking for hardcoded hex colors in style.css..."
          hardcoded=$(grep -E 'color:\s*#[0-9a-fA-F]{3,6}' assets/css/style.css || true)
          if [ -n "$hardcoded" ]; then
            echo "FAIL: style.css contains hardcoded hex colors (use CSS tokens instead):"
            echo "$hardcoded"
            exit 1
          fi
          echo "PASS: No hardcoded hex colors found in style.css"

      - name: 5. No Obsolete Files — No old/backup files in components/
        run: |
          echo "Checking for obsolete files in components/..."
          obsolete=$(find components/ -name '*old*' -o -name '*backup*' 2>/dev/null || true)
          if [ -n "$obsolete" ]; then
            echo "FAIL: Found obsolete files in components/:"
            echo "$obsolete"
            exit 1
          fi
          echo "PASS: No obsolete files found in components/"

      - name: 6. Footer Check — All HTML pages have footer-container
        run: |
          echo "Checking that all pages have footer-container..."
          FAILED=0
          for file in index.html pages/*.html; do
            if ! grep -q 'footer-container' "$file" 2>/dev/null; then
              echo "FAIL: $file is missing footer-container"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 0 ]; then
            echo "PASS: All pages have footer-container"
          fi
          exit $FAILED

      - name: 7. Navigation Links — nav-menu.html paths handled correctly
        run: |
          echo "Checking that nav-menu.html navigation paths are properly handled..."
          FAILED=0
          if grep -q 'href="\./pages/' components/nav-menu.html 2>/dev/null; then
            if ! grep -q "replace('./pages/'," assets/js/header-loader.js 2>/dev/null; then
              echo "FAIL: nav-menu.html uses ./pages/ paths but header-loader.js does not adjust them for internal pages"
              FAILED=1
            else
              echo "PASS: nav-menu.html paths adjusted by header-loader.js"
            fi
          else
            echo "PASS: nav-menu.html does not use paths that break in subdirectories"
          fi
          exit $FAILED
