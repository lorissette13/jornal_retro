<!DOCTYPE html>
<html lang="pt-br" class="internal-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="YourNotes — Mural de Recortes. Crie, edite e gerencie suas notas pessoais em estilo jornal vintage.">
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css?v=2.0">
    <link rel="stylesheet" href="../assets/css/page.css?v=2.0">
    <link rel="stylesheet" href="../assets/css/yournotes.css?v=1.0">
    
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">

    <title>yournotes — mural de recortes</title>
</head>
<body>
    <a href="#main-content" class="skip-link">pular para o conteúdo</a>
    <div class="container">
        <!-- HEADER -->
        <div id="header-container"></div>

        <!-- CONTEÚDO DA PÁGINA -->
        <main class="page-content" role="main" id="main-content">
            <div class="page-header">
                <h1 class="page-title">yournotes</h1>
                <div class="page-subtitle">mural de recortes — suas notas em estilo jornal</div>
            </div>

            <!-- Cabeçalho do mural -->
            <div class="yournotes-header">
                <h2>mural de recortes</h2>
                <span class="mural-counter" id="mural-counter">seu mural está vazio</span>
            </div>

            <!-- Filtros -->
            <div class="yournotes-filters">
                <span class="filter-label">filtrar:</span>
                <button class="filter-btn yn-filter-btn active" data-filter="all">todos</button>
                <button class="filter-btn yn-filter-btn" data-filter="editorial">editorial</button>
                <button class="filter-btn yn-filter-btn" data-filter="classificado">classificado</button>
                <button class="filter-btn yn-filter-btn" data-filter="coluna">coluna</button>
                <button class="filter-btn yn-filter-btn" data-filter="ultima-hora">última hora</button>
                <button class="filter-btn yn-filter-btn" data-filter="nota-pessoal">nota pessoal</button>
            </div>

            <!-- Botão criar nota -->
            <div class="btn-container" style="justify-content: flex-start; margin-bottom: 0;">
                <button class="btn-new-note" id="btn-new-note">+ nova nota</button>
            </div>

            <!-- Mural de notas -->
            <section class="mural-board" id="mural-board" aria-label="mural de notas">
                <!-- Notas renderizadas pelo yournotes.js -->
            </section>

            <!-- Botão de Voltar -->
            <div class="btn-container">
                <a href="../index.html" class="btn-read-more">voltar para home</a>
            </div>
        </main>

        <!-- FOOTER -->
        <div id="footer-container"></div>
    </div>

    <!-- Modal de criação/edição -->
    <div class="yn-modal-overlay" id="yn-modal" role="dialog" aria-modal="true" aria-labelledby="yn-modal-title">
        <div class="yn-modal">
            <button class="yn-modal-close" id="yn-modal-close" aria-label="fechar">×</button>
            <h3 id="yn-modal-title">nova nota</h3>
            <form id="yn-form" novalidate>
                <div class="yn-form-group">
                    <label for="yn-note-title">título (manchete)</label>
                    <input type="text" id="yn-note-title" name="title" placeholder="título da nota..." maxlength="120" required>
                </div>
                <div class="yn-form-group">
                    <label for="yn-note-content">conteúdo</label>
                    <textarea id="yn-note-content" name="content" placeholder="escreva aqui..." maxlength="1000"></textarea>
                </div>
                <div class="yn-form-group">
                    <label for="yn-note-category">categoria</label>
                    <select id="yn-note-category" name="category">
                        <option value="editorial">editorial</option>
                        <option value="classificado">classificado</option>
                        <option value="coluna">coluna</option>
                        <option value="ultima-hora">última hora</option>
                        <option value="nota-pessoal">nota pessoal</option>
                    </select>
                </div>
                <div class="yn-form-actions">
                    <button type="button" class="note-btn note-btn-edit" id="yn-btn-cancel">cancelar</button>
                    <button type="submit" class="btn-new-note">salvar nota</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="../assets/js/utils/component-loader.js"></script>
    <script src="../assets/js/utils/component-checker.js"></script>
    <script src="../assets/js/utils/navigation-checker.js"></script>
    <script src="../assets/js/utils/typewriter.js"></script>
    <script src="../assets/js/header-loader.js"></script>
    <script src="../assets/js/yournotes.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadComponent('header-container', '../components/header.html');
            loadComponent('footer-container', '../components/footer.html');

            setTimeout(function() {
                if (typeof initTypewriter === 'function') {
                    initTypewriter();
                }
            }, 300);
        });
    </script>
</body>
</html>
